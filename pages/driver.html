<!DOCTYPE html>
<html lang="ar" dir="rtl" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="driver_dashboard">لوحة تحكم الإسعاف</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'] }, colors: { primary: '#dc2626', secondary: '#0f172a' } } }
        }
    </script>
    <style>
        body { overflow: hidden; }
        #map-container { height: calc(100vh - 5rem); width: 100%; z-index: 1; }
        .dark .leaflet-layer, .dark .leaflet-control-zoom-in, .dark .leaflet-control-zoom-out, .dark .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
        /* .leaflet-routing-container { display: none !important; } */
        .panel-slide-out { transform: translateX(100%); }
        .panel-slide-in { transform: translateX(0); }
        
        /* أزرار زووم الخريطة بحجم كبير للتابلت */
        .leaflet-control-zoom a {
            background-color: #1f2937 !important; color: white !important; border: 1px solid #374151 !important;
            width: 50px !important; height: 50px !important; line-height: 50px !important; font-size: 24px !important;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-secondary text-gray-900 dark:text-gray-100 font-sans">

    <header class="h-20 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-white/10 flex items-center justify-between px-6 z-[1000] relative shadow-md">
        <div class="flex items-center gap-4">
            <button id="toggle-sidebar-btn" class="text-2xl text-gray-500 hover:text-primary transition-colors hidden" title="إظهار/إخفاء التفاصيل"><i class="fa-solid fa-bars"></i></button>
            <div class="w-12 h-12 bg-primary/20 text-primary rounded-xl flex items-center justify-center text-2xl relative">
                <i class="fa-solid fa-truck-medical"></i><span id="live-indicator" class="absolute -top-1 -right-1 w-3 h-3 bg-success rounded-full animate-ping"></span>
            </div>
            <div>
                <h1 id="unit-code" class="text-xl font-black tracking-tighter">--</h1>
                <span class="text-xs font-bold px-2 py-0.5 rounded bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-500"><i class="fa-solid fa-satellite-dish mr-1"></i> متصل بنظام الملاحة</span>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 px-4 py-2 rounded-xl">
                <span id="status-label" class="text-sm font-bold text-success" data-i18n="status_available">متاح للخدمة</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="status-switch" class="sr-only peer" checked>
                    <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-success"></div>
                </label>
            </div>
            <button id="logoutBtn" class="w-10 h-10 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 hover:bg-red-200 transition flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </header>

    <main class="relative w-full h-full flex overflow-hidden">
        <aside id="info-sidebar" class="w-80 md:w-96 bg-white dark:bg-gray-900 shadow-[20px_0_30px_rgba(0,0,0,0.1)] z-[500] h-full absolute right-0 transition-transform duration-300 panel-slide-out flex flex-col border-l border-gray-200 dark:border-white/10">
            <div class="p-5 border-b border-gray-100 dark:border-white/10 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                <h2 class="font-black text-lg text-primary"><i class="fa-solid fa-file-medical mr-2"></i> ملف المهمة</h2>
                <button id="close-sidebar-btn" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark fa-lg"></i></button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto space-y-6">
                <div class="space-y-3">
                    <h3 class="text-xs text-gray-500 font-bold uppercase" data-i18n="patient_info">بيانات المصاب</h3>
                    <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-xl border border-gray-100 dark:border-gray-700 shadow-sm">
                        <p id="patient-name" class="font-black text-lg mb-2 text-gray-900 dark:text-white">--</p>
                        <div class="flex justify-between items-center bg-white dark:bg-gray-900 p-2 rounded-lg border border-red-100 dark:border-red-900/30 mb-3">
                            <span class="text-sm font-bold text-gray-600 dark:text-gray-400">فصيلة الدم:</span>
                            <span id="patient-blood" class="text-lg font-black text-red-600 bg-red-100 dark:bg-red-900/50 px-2 rounded">--</span>
                        </div>
                        <div class="space-y-2 text-sm">
                            <p><span class="text-gray-500 font-bold">حالات طبية:</span> <span id="patient-notes" class="font-semibold text-gray-800 dark:text-gray-200">--</span></p>
                            <p><span class="text-gray-500 font-bold">جهة الطوارئ:</span> <a href="#" id="patient-phone" class="text-blue-500 font-bold hover:underline">--</a></p>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <h3 class="text-xs text-gray-500 font-bold uppercase" data-i18n="incident_details">المركبة والاصطدام</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2 bg-gray-50 dark:bg-gray-800 p-3 rounded-xl border border-gray-100 dark:border-gray-700 text-center flex justify-around">
                            <div><span class="block text-[10px] text-gray-500">قوة الاصطدام</span><span id="impact-force" class="text-xl font-black text-orange-600">--</span></div>
                            <div><span class="block text-[10px] text-gray-500">السرعة</span><span id="impact-speed" class="text-xl font-black text-blue-600">--</span></div>
                        </div>
                        <div class="col-span-2 bg-gray-50 dark:bg-gray-800 p-3 rounded-xl border border-gray-100 dark:border-gray-700">
                            <p id="car-model" class="font-bold text-sm text-gray-900 dark:text-white">--</p>
                            <p id="car-plate" class="text-xs text-gray-400 font-mono mt-1">--</p>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <h3 class="text-xs text-gray-500 font-bold uppercase">الوجهة الطبية</h3>
                    <div class="bg-blue-600 text-white p-4 rounded-xl shadow-md border border-blue-500 flex items-center gap-3">
                        <i class="fa-solid fa-hospital text-2xl opacity-80"></i>
                        <div><p id="hospital-name" class="font-black text-lg">--</p></div>
                    </div>
                </div>
            </div>
        </aside>

        <div id="map-container" class="flex-1 transition-all duration-300"></div>

        <div class="absolute top-1/2 left-6 -translate-y-1/2 flex flex-col gap-4 z-[1000]">
            <button id="track-btn" class="w-14 h-14 bg-blue-600 text-white rounded-2xl shadow-2xl border-2 border-blue-400 flex items-center justify-center text-2xl transition-all hover:bg-blue-700 active:scale-95" title="تفعيل التتبع اللحظي">
                <i class="fa-solid fa-location-crosshairs"></i>
            </button>
        </div>

        <div id="idle-overlay" class="absolute inset-0 bg-white/40 dark:bg-secondary/60 backdrop-blur-[2px] z-40 flex flex-col items-center justify-center">
            <div class="bg-white/90 dark:bg-gray-900/90 p-8 rounded-[2rem] shadow-2xl flex flex-col items-center border border-gray-200 dark:border-gray-800">
                <i class="fa-solid fa-satellite-dish fa-4x text-gray-400 mb-6 animate-pulse"></i>
                <h2 class="text-2xl font-bold text-gray-600 dark:text-gray-300">في انتظار بلاغات عاجلة...</h2>
            </div>
        </div>

        <div id="action-btn-container" class="hidden absolute bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-[1000] animate-bounce">
            <button id="action-btn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-6 rounded-3xl shadow-[0_20px_40px_-10px_rgba(234,88,12,0.5)] transition-transform active:scale-95 flex items-center justify-center gap-3 text-2xl uppercase tracking-wider">
                <span id="action-text">تأكيد استلام المريض</span>
                <i id="action-icon" class="fa-solid fa-user-check text-3xl"></i>
            </button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script type="module" src="../js/driver/driver.js"></script>
</body>
</html>
